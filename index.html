<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja Óptica Perceptum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --p-dark: #2c3e50; --p-green: #27ae60; --bg: #f8f9fa; --text: #212529; --card: #ffffff; }
        [data-theme="dark"] { --bg: #1a1a1a; --text: #f8f9fa; --card: #2d2d2d; --p-dark: #ecf0f1; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.3s; }
        .card { background-color: var(--card); border: none; border-radius: 15px; }
        .card-header { background-color: #2c3e50; color: white; border-radius: 15px 15px 0 0 !important; font-weight: bold; }
        .resaltado { font-size: 2.2rem; color: var(--p-green); font-weight: bold; }
        .mode-switch { cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Caja Perceptum</h2>
        <div class="mode-switch" onclick="toggleTheme()">🌓</div>
    </div>

    <div class="row">
        <div class="col-md-7 mb-4">
            <div class="card shadow border-0">
                <div class="card-header text-center fs-4">CALCULADORA</div>
                <div class="card-body">
                    
                    <label class="fw-bold mb-1">1. Armazón (Código)</label>
                    <div class="input-group mb-3">
                        <input type="text" id="codArmazon" class="form-control" placeholder="Ej: 10411" oninput="buscarArmazon()">
                        <span class="input-group-text">Neto $</span>
                        <input type="number" id="netoArmazon" class="form-control" value="0" oninput="calcular()">
                    </div>

                    <label class="fw-bold mb-1">2. Selección de Cristal</label>
                    <select id="selectCristal" class="form-select mb-2" onchange="actualizarInterfazCristal()">
                        <option value="">Seleccione Cristal...</option>
                        <option value="cr39_blanco">CR-39 Blanco con AR 1.56</option>
                        <option value="cr39_blue">CR-39 Blue Filter AR 1.56</option>
                        <option value="cr39_foto">CR-39 Fotocromático AR 1.56</option>
                        <option value="poli_ar">Policarbonato AR 1.59</option>
                        <option value="poli_blue">Policarbonato Blue AR 1.59</option>
                        <option value="alto_indice">Alto Índice Blue AR 1.67</option>
                    </select>

                    <div id="seccionRangos" class="row mb-3">
                        <div class="col-6">
                            <small class="fw-bold text-muted">Esfera</small>
                            <select id="esfera" class="form-select" onchange="actualizarPrecioCristal()">
                                <option value="2">Hasta 2.00</option>
                                <option value="4">Hasta 4.00</option>
                                <option value="6">Hasta 6.00</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <small class="fw-bold text-muted">Cilindro</small>
                            <select id="cilindro" class="form-select" onchange="actualizarPrecioCristal()">
                                <option value="2">Hasta -2.00</option>
                                <option value="4">Hasta -4.00</option>
                                <option value="6">Hasta -6.00</option>
                            </select>
                        </div>
                    </div>

                    <label class="fw-bold mb-1">3. Tipo de Armazón (Montaje)</label>
                    <select id="tipoMontaje" class="form-select mb-4" onchange="actualizarPrecioCristal()">
                        <option value="simple">Aro Completo (Simple)</option>
                        <option value="ranurado">Ranurado</option>
                        <option value="perforado">Perforado</option>
                    </select>

                    <div class="p-4 border rounded text-center shadow-sm" style="background: rgba(39, 174, 96, 0.05)">
                        <div class="small fw-bold opacity-75">VENTA FINAL (IVA INCL.)</div>
                        <div class="resaltado" id="precioFinal">$0</div>
                        <div class="small opacity-75 mt-1">Costo Neto (Lente + Montaje): <span id="netoTotal">$0</span></div>
                    </div>

                    <button class="btn btn-success w-100 mt-4 fw-bold p-3" onclick="registrar()">REGISTRAR VENTA</button>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card shadow border-0 h-100">
                <div class="card-header bg-secondary text-center">FLUJO DE CAJA</div>
                <div class="card-body">
                    <table class="table text-center">
                        <thead><tr><th>Item</th><th>Venta</th><th></th></tr></thead>
                        <tbody id="tablaVentas"></tbody>
                    </table>
                    <div class="text-end fw-bold fs-4 mt-3">TOTAL: <span id="totalCaja" class="text-success">$0</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- BASE DE DATOS DE ARMAZONES ---
    const armazonesDB = {
        "10411": 1990, "10410": 1990, "7224": 5500, "9105": 5990
        // Envíame tus códigos para agregarlos aquí!
    };

    // --- BASE DE DATOS DE CRISTALES (Netos) ---
    const cristalesDB = {
        cr39_blanco: { "2/2": 620, "4/2": 620, "6/2": 940, "2/4": 1890, "4/4": 1990, "6/4": 2190, "8/4": 2390, "10/4": 2490, "6/6": 2590 },
        cr39_blue:   { "2/2": 1880, "4/2": 1880, "6/2": 2290, "2/4": 3770, "4/4": 3770, "6/4": 3790 },
        cr39_foto:   { "2/2": 2890, "4/2": 2890, "2/4": 5790, "4/4": 5790 },
        poli_ar:     { "2/2": 2040, "4/2": 2040, "6/2": 2740, "2/4": 5840, "4/4": 5840, "6/4": 7490 },
        poli_blue:   { "2/2": 4000, "4/2": 4000, "2/4": 8000, "4/4": 8000 },
        alto_indice: { fixed_bajo: 11000, fixed_alto: 18000 }
    };

    // --- BASE DE DATOS DE MONTAJES ---
    const montajesDB = {
        organico: { simple: 1500, ranurado: 3000, perforado: 0 },
        especial: { simple: 4000, ranurado: 5000, perforado: 7000 }
    };

    let costoLenteActual = 0;

    function toggleTheme() {
        document.body.setAttribute("data-theme", document.body.getAttribute("data-theme") === "dark" ? "light" : "dark");
    }

    function buscarArmazon() {
        const cod = document.getElementById('codArmazon').value.trim();
        if(armazonesDB[cod]) document.getElementById('netoArmazon').value = armazonesDB[cod];
        calcular();
    }

    function actualizarInterfazCristal() {
        const mat = document.getElementById('selectCristal').value;
        const seccion = document.getElementById('seccionRangos');
        // Si es Alto Índice, mostramos solo cil para decidir entre 11k o 18k
        seccion.style.opacity = (mat === "alto_indice") ? "0.5" : "1";
        actualizarPrecioCristal();
    }

    function actualizarPrecioCristal() {
        const mat = document.getElementById('selectCristal').value;
        const esf = document.getElementById('esfera').value;
        const cil = document.getElementById('cilindro').value;
        const montaje = document.getElementById('tipoMontaje').value;

        if(!mat) return;

        // 1. Precio del Cristal
        if(mat === "alto_indice") {
            costoLenteActual = (cil >= 4) ? cristalesDB.alto_indice.fixed_alto : cristalesDB.alto_indice.fixed_bajo;
        } else {
            let llave = `${esf}/${cil}`;
            costoLenteActual = cristalesDB[mat][llave] || cristalesDB[mat]["2/2"] || 0;
        }

        // 2. Precio del Montaje automático
        let cat = (mat.includes('cr39')) ? 'organico' : 'especial';
        let costoMontaje = montajesDB[cat][montaje] || 0;

        costoLenteActual += costoMontaje;
        calcular();
    }

    function calcular() {
        const netoArm = parseFloat(document.getElementById('netoArmazon').value) || 0;
        const sumaNetos = netoArm + costoLenteActual;
        const venta = Math.round((sumaNetos * 3) * 1.19);
        
        document.getElementById('netoTotal').innerText = "$" + sumaNetos.toLocaleString('es-CL');
        document.getElementById('precioFinal').innerText = "$" + venta.toLocaleString('es-CL');
    }

    function registrar() {
        const v = document.getElementById('precioFinal').innerText;
        if(v === "$0") return;
        const item = document.getElementById('codArmazon').value || "Venta";
        document.getElementById('tablaVentas').innerHTML += `<tr><td>${item}</td><td class="vVal">${v}</td><td><button class="btn btn-sm btn-danger" onclick="this.parentElement.parentElement.remove(); actualizarCaja()">×</button></td></tr>`;
        actualizarCaja();
    }

    function actualizarCaja() {
        let t = 0;
        document.querySelectorAll('.vVal').forEach(td => t += parseInt(td.innerText.replace(/\D/g, '')));
        document.getElementById('totalCaja').innerText = "$" + t.toLocaleString('es-CL');
    }
</script>
</body>
</html>
