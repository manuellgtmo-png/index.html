<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja Óptica Perceptum - Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --p-dark: #2c3e50; --p-green: #27ae60; --bg: #f8f9fa; --text: #212529; --card: #ffffff; }
        [data-theme="dark"] { --bg: #1a1a1a; --text: #f8f9fa; --card: #2d2d2d; --p-dark: #ecf0f1; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: 0.3s; }
        .card { background-color: var(--card); border: none; border-radius: 15px; }
        .card-header { background-color: #2c3e50; color: white; border-radius: 15px 15px 0 0 !important; font-weight: bold; }
        .resaltado { font-size: 2.2rem; color: var(--p-green); font-weight: bold; }
        .mode-switch { cursor: pointer; font-size: 1.5rem; }
        .label-group { font-size: 0.9rem; margin-top: 10px; display: block; color: var(--p-green); font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">Centro Perceptum</h2>
            <small class="text-secondary">Gestión de Caja Oftalmológica</small>
        </div>
        <div class="mode-switch" onclick="toggleTheme()">🌓</div>
    </div>

    <div class="row">
        <div class="col-md-7 mb-4">
            <div class="card shadow border-0">
                <div class="card-header text-center fs-4">CALCULADORA DE LENTES</div>
                <div class="card-body">
                    
                    <div class="row mb-3">
                        <div class="col-12">
                            <label class="fw-bold">1. Armazón (Código o Manual)</label>
                            <div class="input-group">
                                <input type="text" id="codArmazon" class="form-control" placeholder="Código" oninput="buscarPrecioArmazon()">
                                <span class="input-group-text">Neto $</span>
                                <input type="number" id="netoArmazon" class="form-control" placeholder="0" oninput="calcular()">
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="fw-bold mb-2">2. Selección de Cristal</label>
                        <div class="col-12 mb-2">
                            <select id="selectCristal" class="form-select" onchange="actualizarPrecioCristal()">
                                <option value="">Seleccione Material...</option>
                                <option value="cr39_blanco">CR-39 Blanco AR 1.56</option>
                                <option value="cr39_blue">CR-39 Blue Filter AR 1.56</option>
                                <option value="cr39_foto_cafe">CR-39 Foto Café AR 1.56</option>
                                <option value="cr39_foto_gris">CR-39 Foto Gris Blue AR 1.56</option>
                                <option value="poli_ar">Policarbonato AR 1.59</option>
                                <option value="poli_blue">Policarbonato Blue AR 1.59</option>
                                <option value="poli_blanco_neutro">Poli Blanco (Solo Neutro)</option>
                                <option value="antiage">Antiage Blue Filter 1.60</option>
                                <option value="alto_indice">Alto Índice Blue 1.67</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <span class="label-group">Rango Esfera</span>
                            <select id="esferaRango" class="form-select" onchange="actualizarPrecioCristal()">
                                <option value="2">Hasta 2.00</option>
                                <option value="4">Hasta 4.00</option>
                                <option value="6">Hasta 6.00</option>
                                <option value="8">Hasta 8.00</option>
                                <option value="10">Hasta 10.00</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <span class="label-group">Rango Cilindro</span>
                            <select id="cilRango" class="form-select" onchange="actualizarPrecioCristal()">
                                <option value="2">Cil hasta -2.00</option>
                                <option value="4">Cil hasta -4.00</option>
                                <option value="6">Cil hasta -6.00</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="fw-bold">3. Montaje</label>
                            <select id="tipoArmazonMontaje" class="form-select" onchange="actualizarPrecioCristal()">
                                <option value="simple">Aro Completo (Simple)</option>
                                <option value="ranurado">Ranurado</option>
                                <option value="perforado">Perforado</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="fw-bold">Costo Cristal + Montaje</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" id="netoCristalYMontaje" class="form-control" placeholder="0" oninput="calcular()">
                            </div>
                        </div>
                    </div>

                    <div class="p-4 border rounded text-center shadow-sm" style="background: rgba(39, 174, 96, 0.1)">
                        <div class="small fw-bold opacity-75 mb-1">PRECIO VENTA FINAL (IVA INCL.)</div>
                        <div class="resaltado" id="precioFinal">$0</div>
                        <div class="small opacity-75 mt-2">Suma Netos: <span id="sumaNetos">$0</span> | Factor: x3 + 19%</div>
                    </div>

                    <button class="btn btn-success w-100 mt-4 fw-bold p-3" onclick="registrar()">REGISTRAR VENTA</button>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card shadow border-0 h-100">
                <div class="card-header bg-secondary text-center">FLUJO DE CAJA DIARIO</div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table text-center">
                            <thead><tr><th>Item</th><th>Venta</th><th>Acción</th></tr></thead>
                            <tbody id="tablaVentas"></tbody>
                        </table>
                    </div>
                    <div class="text-end fw-bold fs-4 mt-3 p-3 rounded" style="background: rgba(0,0,0,0.05)">
                        TOTAL: <span id="totalCaja" class="text-success">$0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- BASE DE DATOS MAESTRA (Precios Netos Laboratorio) ---
    const cristalesDB = {
        cr39_blanco: { "2/2": 620, "4/2": 620, "6/2": 940, "2/4": 1890, "4/4": 1990, "6/4": 2190, "8/4": 2390, "10/4": 2490, "6/6": 2590, "CIL2": 690, "CIL4": 1890, "CIL6": 2390 },
        cr39_blue:   { "2/2": 1880, "4/2": 1880, "6/2": 2290, "2/4": 3770, "4/4": 3770, "6/4": 3790, "CIL2": 1880, "CIL4": 3770, "CIL6": 7700 },
        cr39_foto_cafe: { "2/2": 2890, "4/2": 2890, "2/4": 5790, "4/4": 5790, "CIL2": 2890, "CIL4": 5790 },
        cr39_foto_gris: { "2/2": 3500, "4/2": 3500, "2/4": 4000, "4/4": 4000, "CIL2": 3500, "CIL4": 4000 },
        poli_ar:     { "2/2": 2040, "4/2": 2040, "6/2": 2740, "2/4": 5840, "4/4": 5840, "6/4": 7490, "CIL2": 2540, "CIL4": 5840, "CIL6": 8490 },
        poli_blue:   { "2/2": 4000, "4/2": 4000, "2/4": 8000, "4/4": 8000, "CIL2": 4000, "CIL4": 8000 },
        poli_blanco_neutro: { "NEUTRO": 1600 },
        antiage:     { "2/2": 12000, "4/2": 12000, "CIL2": 12000, "CIL4": 12000 },
        alto_indice: { "6/2": 11000, "8/2": 11000, "10/2": 11000, "6/4": 18000, "8/4": 18000, "10/4": 18000 }
    };

    const montajesDB = {
        organico: { simple: 1500, ranurado: 3000, perforado: 5000 },
        especial: { simple: 2500, ranurado: 4000, perforado: 7000 },
        premium:  { simple: 6000, ranurado: 9000, perforado: 10000 }
    };

    const baseArmazones = {"10411": 1990, "10410": 1990, "7224": 5500, "9105": 5990};

    function toggleTheme() {
        const body = document.body;
        body.setAttribute("data-theme", body.getAttribute("data-theme") === "dark" ? "light" : "dark");
    }

    function buscarPrecioArmazon() {
        const cod = document.getElementById('codArmazon').value;
        if(baseArmazones[cod]) document.getElementById('netoArmazon').value = baseArmazones[cod];
        calcular();
    }

    function actualizarPrecioCristal() {
        const material = document.getElementById('selectCristal').value;
        const esf = document.getElementById('esferaRango').value;
        const cil = document.getElementById('cilRango').value;
        const tipoMontaje = document.getElementById('tipoArmazonMontaje').value;
        
        if (!material) return;

        // 1. Lógica de precio cristal
        let llave = `${esf}/${cil}`;
        let costoCristal = cristalesDB[material][llave] || cristalesDB[material][`2/2`] || 0;
        
        // 2. Lógica de precio montaje
        let categoriaMontaje = "especial";
        if (material === "cr39_blanco") categoriaMontaje = "organico";
        if (material === "alto_indice" || material === "antiage") categoriaMontaje = "premium";
        
        let costoMontaje = montajesDB[categoriaMontaje][tipoMontaje];

        document.getElementById('netoCristalYMontaje').value = costoCristal + costoMontaje;
        calcular();
    }

    function calcular() {
        const nA = parseFloat(document.getElementById('netoArmazon').value) || 0;
        const nCM = parseFloat(document.getElementById('netoCristalYMontaje').value) || 0;
        const sumaNetos = nA + nCM;
        
        // FÓRMULA: (Neto * 3) + 19% IVA
        const precioVenta = Math.round((sumaNetos * 3) * 1.19);
        
        document.getElementById('sumaNetos').innerText = "$" + sumaNetos.toLocaleString('es-CL');
        document.getElementById('precioFinal').innerText = "$" + precioVenta.toLocaleString('es-CL');
    }

    function registrar() {
        const v = document.getElementById('precioFinal').innerText;
        if(v === "$0") return;
        const it = document.getElementById('codArmazon').value || "Lente Completo";
        const cristal = document.getElementById('selectCristal').options[document.getElementById('selectCristal').selectedIndex].text;
        
        document.getElementById('tablaVentas').innerHTML += `
            <tr>
                <td><small>${it}</small><br><span class="badge bg-info" style="font-size:0.7rem">${cristal}</span></td>
                <td class="vVal fw-bold">${v}</td>
                <td><button class="btn btn-sm btn-outline-danger" onclick="this.parentElement.parentElement.remove(); actualizarCaja()">×</button></td>
            </tr>`;
        actualizarCaja();
    }

    function actualizarCaja() {
        let t = 0;
        document.querySelectorAll('.vVal').forEach(td => t += parseInt(td.innerText.replace(/\D/g, '')));
        document.getElementById('totalCaja').innerText = "$" + t.toLocaleString('es-CL');
    }
</script>
</body>
</html>
